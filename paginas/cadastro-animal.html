<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Animal - ARCA</title>
<link rel="stylesheet" href="../css/cadastro-animal.css">
</head>

<body>

<header>

<div class="logo">
<img src="../imagens/logo_arca.png" alt="ARCA">
</div>

<nav>
<a href="dashboard.html">Dashboard</a>
<a href="cadastro-animal.html">Cadastrar Animal</a>
<a href="denuncias.html">Denúncias</a>
<a href="atendimento.html">Atendimento</a>
</nav>

</header>

<main>

<section class="titulo">

<h1>Cadastro de Animal</h1>

<p>
Registre novos animais resgatados pelo Programa ARCA.
</p>

</section>

<section class="container-formulario">

<form id="formAnimal">

<div class="grupo">

<label>Nome do Animal</label>
<input type="text" id="nome" required>

</div>

<div class="grupo">

<label>Espécie</label>

<select id="especie">

<option>Cachorro</option>
<option>Gato</option>

</select>

</div>

<div class="grupo">

<label>Raça</label>
<input type="text" id="raca" required>

</div>

<div class="grupo">

<label>Idade</label>
<input type="number" id="idade" required>

</div>

<div class="grupo">

<label>Sexo</label>

<select id="sexo">

<option>Macho</option>
<option>Fêmea</option>

</select>

</div>

<div class="grupo">

<label>Status</label>

<select id="status">

<option>Disponível</option>
<option>Em Tratamento</option>
<option>Resgatado</option>
<option>Adotado</option>

</select>

</div>

<div class="grupo">

<label>Foto do Animal</label>
<input type="file">

</div>

<div class="grupo-full">

<label>Observações</label>

<textarea id="obs"></textarea>

</div>

<button type="submit">
Cadastrar Animal
</button>

</form>

</section>

<section class="imagem-destaque">

<img src="../imagens/download (1).jpg" alt="Animal">

</section>

</main>

<footer>

Programa ARCA • Prefeitura da Serra

</footer>

<script src="../js/cadastro-animal.js"></script>

</body>
</html>
