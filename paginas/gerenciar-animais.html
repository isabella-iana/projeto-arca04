<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Animais - ARCA</title>
    <link rel="stylesheet" href="../css/gerenciar-animais.css">
</head>

<body>

    <header>

        <div class="logo-area">
            <img src="../imagens/logo_arca.png" alt="ARCA">
        </div>

        <nav>

            <a href="dashboard.html">Dashboard</a>
            <a href="gerenciar-animais.html">Animais</a>
            <a href="denuncias.html">Denúncias</a>
            <a href="atendimento.html">Atendimento</a>
            <a href="relatorios.html">Relatórios</a>
        </nav>

        <div class="usuario">
            Prefeitura
        </div>

    </header>

    <main>

        <section class="titulo">

            <h1>Gerenciamento de Animais</h1>

            <p>
                Cadastro, edição e remoção de animais resgatados.
            </p>

        </section>

        <section class="crud">

            <form id="animalForm">

                <input type="hidden" id="indice">

                <label>Nome</label>
                <input type="text" id="nome" required>

                <label>Espécie</label>

                <select id="especie">

                    <option>Cachorro</option>
                    <option>Gato</option>

                </select>

                <label>Raça</label>

                <input type="text" id="raca" required>

                <label>Status</label>

                <select id="status">

                    <option>Disponível</option>
                    <option>Em Tratamento</option>
                    <option>Adotado</option>

                </select>

                <button type="submit">
                    Salvar Animal
                </button>

            </form>

        </section>

        <section class="tabela">

            <table>

                <thead>

                    <tr>

                        <th>Nome</th>
                        <th>Espécie</th>
                        <th>Raça</th>
                        <th>Status</th>
                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="listaAnimais">

                </tbody>

            </table>

        </section>

    </main>

    <footer>

        Programa ARCA • Prefeitura da Serra

    </footer>

    <script src="../js/gerenciar-animais.js"></script>

</body>

</html>
