<main>

<section class="titulo">

<h1>Gerenciamento de Animais</h1>

<p>
Cadastro, edição e remoção de animais resgatados.
</p>

</section>

<section class="crud">

<form id="animalForm">

<input
type="hidden"
id="indice"
>

<label>Nome</label>
<input
type="text"
id="nome"
required
>

<label>Espécie</label>

<select id="especie">

<option>Cachorro</option>
<option>Gato</option>

</select>

<label>Raça</label>

<input
type="text"
id="raca"
required
>

<label>Status</label>

<select id="status">

<option>Disponível</option>
<option>Em Tratamento</option>
<option>Adotado</option>

</select>

<button type="submit">
Salvar Animal
</button>

</form>

</section>

<section class="tabela">

<table>

<thead>

<tr>

<th>Nome</th>
<th>Espécie</th>
<th>Raça</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="listaAnimais">

</tbody>

</table>

</section>

<section class="banner">

<img src="img/cao4.jpg" alt="Animal">

</section>

</main>
