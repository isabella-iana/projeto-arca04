<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer uma Denúncia - ARCA</title>
    <link rel="stylesheet" href="../css/denunciar.css">
</head>

<body>

    <header>

        <div class="logo-area">
            <img src="../imagens/logo_arca.png" alt="ARCA">
        </div>

        <nav>

            <a href="home.html">Home</a>
            <a href="adotar.html">Adotar</a>
            <a href="denunciar.html">Denúnciar</a>
            <a href="solicitar-atendimento.html">Soliciar Atendimento</a>
            <a href="contato.html">Contato</a>
        </nav>

        <div class="usuario">
            Tutor
        </div>

    </header>

    <main>

        <section class="boas-vindas">
            <h1>Realizar Denúncia</h1>
        </section>

        <section class="form">
            <label for="email">Email: </label>
            <input type="email" id="email">

            <label for="tel">Telefone (sem DDD): </label>
            <input type="tel" id="tel">

            <label for="endereco">Local: </label>
            <input type="text" id="endereco">

            <label for="descricao">Descreva a Ocorrência: </label>
            <textarea id="descricao" rows="10" cols="50"></textarea>

            <button id="btn-submit-denuncia">Concluir</button>
        </section>

        <div id="popup" class="popup">
            <div class="popup-content">
                <h2>Denúncia Realizada!</h2>
                <p>Sua denúncia foi enviada com sucesso.</p>
                <button id="btn-fechar-popup">Fechar</button>
            </div>
        </div>

    </main>

    <footer>

        Programa ARCA • Prefeitura da Serra

    </footer>

    <script src="../js/denunciar.js"></script>
</body>

</html>
