<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adotar um Animal - ARCA</title>
    <link rel="stylesheet" href="../css/formulario-adocao.css">
</head>

<body>

    <header>

        <div class="logo-area">
            <img src="../imagens/logo_arca.png" alt="ARCA">
        </div>

        <nav>

            <a href="#">Home</a>
            <a href="adotar.html">Adotar</a>
            <a href="denunciar.html">Denúnciar</a>
            <a href="solicitar-atendimento.html">Soliciar Atendimento</a>
            <a href="contato.html">Contato</a>
        </nav>

        <div class="usuario">
            Tutor
        </div>

    </header>

    <main>

        <section class="boas-vindas">
            <h1>Formulário para Adoção</h1>
        </section>

        <section class="form">
            <label for="nome">Nome Completo: </label>
            <input type="text" id="nome">

            <label for="cpf">CPF (somente números): </label>
            <input type="text" id="cpf">

            <label for="email">Email: </label>
            <input type="email" id="email">

            <label for="endereco">Endereço Completo: </label>
            <input type="text" id="endereco">

            <button id="btn-submit-adocao">Concluir</button>
        </section>

        <div id="popup" class="popup">
            <div class="popup-content">
                <h2>Cadastro concluído!</h2>
                <p>Seu formulário de adoção foi enviado com sucesso.</p>
                <button id="btn-fechar-popup">Fechar</button>
            </div>
        </div>

    </main>

    <footer>

        Programa ARCA • Prefeitura da Serra

    </footer>

    <script src="../js/formulario-adocao.js"></script>
</body>

</html>
